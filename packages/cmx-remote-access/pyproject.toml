[tool.poetry]
name = "cmx-remote-access"
version = "0.3.11"
description = "Shared contracts and HTTP auth for CellMax remote-access services (stations, apps, hardware bridges)."
authors = ["CellMax Technologies"]
readme = "README.md"
packages = [{ include = "cmx_remote_access" }]

[tool.poetry.dependencies]
python = ">=3.10,<3.14"
fastapi = "^0.115.0"
httpx = { version = "^0.27.0", optional = true }
uvicorn = { version = "^0.32.0", optional = true }
python-dotenv = { version = "^1.0.1", optional = true }

[tool.poetry.extras]
proxy = ["httpx", "uvicorn", "python-dotenv"]

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.0"

[tool.poetry.scripts]
cmx-remote-proxy = "cmx_remote_access.proxy.main:run"
init-remote-access = "cmx_remote_access.client_init:main"
cmx-release-package = "cmx_remote_access.release:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
